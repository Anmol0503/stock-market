<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>DI — social slide</title>
<style>
  :root{
    --bg:#0b0f17; --panel:#131a26; --panel2:#0f1620; --line:#2a3547; --txt:#e7edf5; --dim:#93a4b8;
    --accent:#5b9dff; --amber:#f5b942; --up:#3fb950; --down:#f4685f;
    --geopolitics:#f4685f; --economy:#3fb950; --technology:#a970ff; --science:#2dd4bf;
    --health:#f472b6; --climate:#5cc98a; --india:#ff9933; --markets:#5b9dff; --learn:#f5b942;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --round:ui-rounded,"SF Pro Rounded",-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:1080px;height:1350px;overflow:hidden;background:var(--bg);color:var(--txt);
    font-family:var(--sans);-webkit-font-smoothing:antialiased}
  .slide{position:relative;width:1080px;height:1350px;padding:78px 76px 68px;display:flex;flex-direction:column;overflow:hidden}
  /* category glow from the top */
  .slide::before{content:"";position:absolute;inset:0 0 auto 0;height:620px;pointer-events:none;
    background:linear-gradient(180deg, color-mix(in srgb, var(--cat,var(--accent)) 26%, transparent), transparent)}
  .slide::after{content:"";position:absolute;left:0;right:0;bottom:0;height:8px;background:var(--cat,var(--accent))}
  .slide > *{position:relative;z-index:1}

  /* brand row */
  .brand{display:flex;align-items:center;justify-content:space-between;font-weight:800;letter-spacing:.14em;
    font-size:23px;text-transform:uppercase;color:var(--dim)}
  .brand .name{display:flex;align-items:center;gap:14px;color:var(--txt)}
  .brand .dot{width:22px;height:22px;border-radius:7px;background:var(--cat,var(--accent));
    box-shadow:0 0 0 6px color-mix(in srgb,var(--cat,var(--accent)) 22%,transparent)}

  /* meta: category chip + when/source */
  .meta{display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-top:56px}
  .chip{display:inline-flex;align-items:center;gap:12px;padding:12px 26px;border-radius:99px;
    font-weight:800;font-size:30px;background:color-mix(in srgb,var(--cat,var(--accent)) 20%,transparent);color:var(--cat,var(--accent))}
  .crit{display:inline-flex;align-items:center;gap:9px;color:var(--down);font-weight:800;font-size:26px}
  .when{display:flex;align-items:center;gap:12px;font-size:26px;font-weight:700;color:var(--dim);margin-top:26px}
  .when .wdot{width:14px;height:14px;border-radius:99px;background:var(--up);box-shadow:0 0 0 6px color-mix(in srgb,var(--up) 22%,transparent)}
  .when .src{color:var(--cat,var(--accent))}

  h1{font-family:var(--round);font-weight:800;font-size:58px;line-height:1.12;letter-spacing:-.5px;margin-top:28px;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

  /* the takeaway hero */
  .moot{margin-top:38px;background:linear-gradient(135deg, color-mix(in srgb,var(--cat,var(--accent)) 16%, var(--panel)), var(--panel2));
    border:2px solid color-mix(in srgb,var(--cat,var(--accent)) 34%, var(--line));
    border-left:12px solid var(--cat,var(--accent));border-radius:26px;padding:32px 36px}
  .moot .lbl{font-size:23px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--cat,var(--accent));margin-bottom:16px}
  .moot .txt{font-family:var(--round);font-size:40px;line-height:1.34;font-weight:700;
    display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}

  .kpts{margin-top:28px;display:flex;flex-direction:column;gap:16px}
  .kpts li{list-style:none;position:relative;padding-left:40px;font-size:30px;line-height:1.36;color:#d3dbe6;
    display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
  .kpts li::before{content:"◆";position:absolute;left:0;top:1px;font-size:22px;color:var(--cat,var(--accent))}
  mark{background:color-mix(in srgb,var(--amber) 26%,transparent);color:var(--txt);border-radius:6px;padding:0 8px;font-weight:700}

  /* footer pinned to the bottom */
  .foot{margin-top:auto;padding-top:36px;display:flex;align-items:center;justify-content:space-between;font-size:24px;font-weight:700;color:var(--dim)}
  .foot .handle{color:var(--txt)}
  .pagenum{font-family:var(--round);font-weight:800}

  /* cover */
  .cover{align-items:center;justify-content:center;text-align:center;gap:0}
  .cover .emoji{font-size:150px;line-height:1}
  .cover .region{font-family:var(--round);font-size:96px;font-weight:800;letter-spacing:-1px;margin-top:10px}
  .cover .day{font-size:34px;font-weight:700;color:var(--dim);margin-top:22px;text-transform:uppercase;letter-spacing:.1em}
  .cover .lead{font-family:var(--round);font-size:52px;font-weight:800;margin-top:46px;line-height:1.25}
  .cover .swipe{font-size:30px;font-weight:800;color:var(--cat,var(--accent));margin-top:56px}
  .brandtop{position:absolute;top:78px;left:76px;right:76px}

  /* cta */
  .cta{align-items:center;justify-content:center;text-align:center}
  .cta .big{font-family:var(--round);font-size:66px;font-weight:800;line-height:1.18;letter-spacing:-.5px}
  .cta .sub{font-size:36px;color:#cdd7e4;margin-top:30px;line-height:1.4}
  .cta .handle{font-family:var(--round);font-size:52px;font-weight:800;color:var(--cat,var(--accent));margin-top:52px}
  .cta .link{font-size:32px;font-weight:700;color:var(--txt);margin-top:16px}
  .cta .sponsor{margin-top:44px;font-size:27px;color:var(--dim);border:2px solid var(--line);border-radius:16px;padding:20px 28px;max-width:820px}
  .disc{margin-top:46px;font-size:22px;line-height:1.5;color:var(--dim);max-width:840px}
</style>
</head>
<body>
<div id="root"></div>
<script id="data">/*__SLIDE__*/</script>
<script>
const esc = s => (s==null?'':String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])));
const hl  = s => esc(s).replace(/([₹$€£]\s?\d[\d,]*\.?\d*|\b\d+(?:\.\d+)?%)/g,'<mark>$1</mark>');
const CAT = {geopolitics:{lbl:"Geopolitics",emoji:"🌍"},economy:{lbl:"Economy",emoji:"💵"},
  technology:{lbl:"Technology",emoji:"⚙️"},science:{lbl:"Science",emoji:"🔬"},health:{lbl:"Health",emoji:"🩺"},
  climate:{lbl:"Climate",emoji:"🌱"},india:{lbl:"India",emoji:"🇮🇳"},markets:{lbl:"Markets",emoji:"📈"}};
function relTime(iso){ if(!iso) return ''; const t=new Date(iso); if(isNaN(t)) return '';
  const m=Math.max(0,Math.round((Date.now()-t)/60000)); if(m<2)return'just now'; if(m<60)return m+'m ago';
  const h=Math.round(m/60); if(h<24)return h+'h ago'; const d=Math.round(h/24); return d===1?'yesterday':d+'d ago'; }
const catVar = c => `--cat:var(--${CAT[c]?c:'markets'})`;
const catName = c => (CAT[c]||CAT.markets);

const DEMO = {type:'story',category:'geopolitics',handle:'@daily.decoded',page:'2 / 7',
  title:'A long sample headline to preview how the story slide wraps and clamps cleanly',
  moot:'The one bold takeaway goes here — the decoded lesson the reader keeps after the news is stale.',
  key_points:['First punchy key point','Second key point with a $80 figure','Third key point'],
  published_iso:new Date(Date.now()-3*3600e3).toISOString(), source:'Reuters'};

function slideStory(c){
  const cn=catName(c.category);
  const kp=(c.key_points||[]).slice(0,3).map(k=>`<li>${hl(k)}</li>`).join('');
  return `<div class="slide" style="${catVar(c.category)}">
    <div class="brand"><span class="name"><span class="dot"></span>Daily Intelligence</span><span>Decoded</span></div>
    <div class="meta"><span class="chip">${cn.emoji} ${esc(cn.lbl)}</span>${c.importance==='critical'?'<span class="crit">● critical</span>':''}</div>
    <div class="when">${c.published_iso?`<span class="wdot"></span>${esc(relTime(c.published_iso))}`:''}${c.source?` · <span class="src">${esc(String(c.source).split(' (')[0])}</span>`:''}</div>
    <h1>${esc(c.title)}</h1>
    <div class="moot"><div class="lbl">💡 The takeaway</div><div class="txt">${esc(c.moot||'')}</div></div>
    ${kp?`<ul class="kpts">${kp}</ul>`:''}
    <div class="foot"><span class="handle">${esc(c.handle||'@daily.decoded')}</span><span class="pagenum">${esc(c.page||'')}</span></div>
  </div>`;
}
function slideCover(c){
  return `<div class="slide cover" style="${catVar(c.category)}">
    <div class="brand brandtop"><span class="name"><span class="dot"></span>Daily Intelligence</span><span>Decoded</span></div>
    <div class="emoji">${esc(c.emoji||'🌍')}</div>
    <div class="region">${esc(c.region||'Global')}</div>
    <div class="day">${esc(c.day_label||'')}</div>
    <div class="lead">${esc(c.lead||"Today's top stories — decoded")}</div>
    <div class="swipe">swipe →</div>
  </div>`;
}
function slideCta(c){
  return `<div class="slide cta" style="${catVar(c.category||'markets')}">
    <div class="brand brandtop"><span class="name"><span class="dot"></span>Daily Intelligence</span><span>Decoded</span></div>
    <div class="big">${esc(c.big||'The world & markets,\ndecoded for beginners.').replace(/\n/g,'<br>')}</div>
    <div class="sub">${esc(c.sub||'What happened → why it matters → what to watch. Every day.')}</div>
    <div class="handle">${esc(c.handle||'@daily.decoded')}</div>
    <div class="link">${esc(c.link||'Full decoded feed → link in bio')}</div>
    ${c.sponsor?`<div class="sponsor">${esc(c.sponsor)}</div>`:''}
    <div class="disc">${esc(c.disclaimer||'Decoded from public reporting for general understanding. Not financial advice.')}</div>
  </div>`;
}
const SLIDE = (window.__SLIDE__)||DEMO;
const R = {story:slideStory, cover:slideCover, cta:slideCta};
document.getElementById('root').innerHTML = (R[SLIDE.type]||slideStory)(SLIDE);
</script>
</body>
</html>
