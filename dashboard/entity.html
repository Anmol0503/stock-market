<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0f17">
<title>Entity — Daily Intelligence</title>
<style>
  :root{
    --bg:#0b0f17; --panel:#131a26; --panel2:#0f1620; --line:#222c3b; --txt:#e7edf5; --dim:#8ea0b5;
    --accent:#5b9dff; --amber:#f5b942; --up:#3fb950; --down:#f4685f;
    --geopolitics:#f4685f; --economy:#3fb950; --technology:#a970ff; --science:#2dd4bf;
    --health:#f472b6; --climate:#5cc98a; --india:#ff9933; --markets:#5b9dff; --learn:#f5b942;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --round:ui-rounded,"SF Pro Rounded",-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--txt);font-family:var(--sans);line-height:1.5;
    -webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none}
  .wrap{max-width:720px;margin:0 auto;padding:calc(env(safe-area-inset-top) + 16px) 16px 60px}
  .top{display:flex;align-items:center;gap:12px;margin-bottom:18px}
  .back{flex:0 0 auto;width:38px;height:38px;border-radius:99px;border:1px solid var(--line);background:var(--panel2);
    display:inline-flex;align-items:center;justify-content:center;color:var(--dim);font-size:18px}
  .kick{font-size:12.5px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--dim)}
  h1{font-family:var(--round);font-size:30px;font-weight:800;letter-spacing:-.5px;margin:2px 0 0}
  .sub{color:var(--dim);font-size:13.5px;margin-top:3px}
  .primer{background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 12%,var(--panel)),var(--panel2));
    border:1px solid var(--line);border-left:5px solid var(--accent);border-radius:16px;padding:16px 18px;margin:6px 0 26px}
  .primer .lbl{font-size:11.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
  .primer .txt{font-size:16px;line-height:1.6;color:#e7edf5}
  .tlabel{font-size:12.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin:0 0 12px}
  .row{position:relative;padding:0 0 20px 26px;border-left:2px solid var(--line);margin-left:6px}
  .row::before{content:"";position:absolute;left:-7px;top:3px;width:12px;height:12px;border-radius:99px;
    background:var(--cat,var(--accent));box-shadow:0 0 0 4px color-mix(in srgb,var(--cat,var(--accent)) 20%,transparent)}
  .row:last-child{border-left-color:transparent}
  .rmeta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px}
  .date{font-size:12.5px;font-weight:800;color:var(--dim)}
  .catchip{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:99px;
    background:color-mix(in srgb,var(--cat,var(--accent)) 18%,transparent);color:var(--cat,var(--accent))}
  .rtitle{font-size:16.5px;font-weight:700;line-height:1.35;color:var(--txt)}
  .rtitle a{color:var(--txt)} .rtitle a:active{color:var(--accent)}
  .moot{font-size:14px;line-height:1.55;color:#c3cedd;margin-top:5px}
  .empty{text-align:center;color:var(--dim);padding:60px 20px}
  .foot{color:var(--dim);font-size:12px;text-align:center;margin-top:28px}
  mark{background:color-mix(in srgb,var(--amber) 24%,transparent);color:var(--txt);border-radius:5px;padding:0 5px;font-weight:700}
</style>
</head>
<body>
<div class="wrap" id="wrap"><div class="empty">Loading…</div></div>
<script>
const esc = s => (s==null?'':String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])));
const hl  = s => esc(s).replace(/([₹$€£]\s?\d[\d,]*\.?\d*|\b\d+(?:\.\d+)?%)/g,'<mark>$1</mark>');
const CAT = {geopolitics:{lbl:"Geopolitics",emoji:"🌍"}, economy:{lbl:"Economy",emoji:"💵"},
  technology:{lbl:"Technology",emoji:"⚙️"}, science:{lbl:"Science",emoji:"🔬"}, health:{lbl:"Health",emoji:"🩺"},
  climate:{lbl:"Climate",emoji:"🌱"}, india:{lbl:"India",emoji:"🇮🇳"}, markets:{lbl:"Markets",emoji:"📈"}};
function catChip(cat){ const c=CAT[cat]||CAT.markets; return `<span class="catchip" style="--cat:var(--${CAT[cat]?cat:'markets'})">${c.emoji} ${c.lbl}</span>`; }
function fmtDate(d){ try{ return new Date(d+'T00:00:00').toLocaleDateString([], {day:'numeric',month:'short',year:'numeric'}); }catch(e){ return d; } }

const slug = new URLSearchParams(location.search).get('e') || '';
const wrap = document.getElementById('wrap');

fetch('./entities.json?_='+Date.now()).then(r=>r.ok?r.json():null).catch(()=>null).then(data=>{
  const e = data && data.entities && data.entities[slug];
  if(!e){
    wrap.innerHTML = `<div class="top"><a class="back" href="./reels/">←</a></div>
      <div class="empty">📭<br>No entity page for “${esc(slug)}” yet.<br>
      <span style="font-size:12.5px">Pages appear once we've covered a place/player at least a few times.</span></div>`;
    return;
  }
  document.title = e.name + ' — Daily Intelligence';
  const dates = e.stories.map(s=>s.date).filter(Boolean).sort();
  const since = dates.length ? fmtDate(dates[0]) : '';
  const rows = e.stories.map(s=>`
    <div class="row" style="--cat:var(--${CAT[s.category]?s.category:'markets'})">
      <div class="rmeta"><span class="date">${esc(fmtDate(s.date))}</span>${s.category?catChip(s.category):''}</div>
      <div class="rtitle">${s.url?`<a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.title)}</a>`:esc(s.title)}</div>
      ${s.moot?`<div class="moot">${hl(s.moot)}</div>`:''}
    </div>`).join('');
  wrap.innerHTML = `
    <div class="top"><a class="back" href="./reels/" title="Back to the feed">←</a>
      <div><div class="kick">Following</div><h1>${esc(e.name)}</h1>
      <div class="sub">${e.stories.length} stories decoded${since?` · since ${esc(since)}`:''}</div></div></div>
    ${e.primer?`<div class="primer"><div class="lbl">📖 The standing backstory</div><div class="txt">${esc(e.primer)}</div></div>`:''}
    <div class="tlabel">🕘 Timeline — newest first</div>
    ${rows||'<div class="empty">No stories yet.</div>'}
    <div class="foot"><a href="./reels/">← Back to the feed</a> · <a href="./">Dashboard</a></div>`;
}).catch(()=>{ wrap.innerHTML='<div class="empty">Could not load entity data.</div>'; });
</script>
</body>
</html>
