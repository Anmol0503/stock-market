<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0f17">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Reels">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-180.png">
<title>Daily Intelligence — Reels</title>
<script>
  // Same education layer as the dashboard (cache-busted like index.html does).
  document.write('<script src="../glossary.js?v=' + Date.now() + '"><\/script>');
</script>
<style>
  :root{
    --bg:#0b0f17; --panel:#131a26; --panel2:#0f1620; --line:#222c3b; --txt:#e7edf5; --dim:#8ea0b5;
    --accent:#5b9dff; --amber:#f5b942;
    --up:#3fb950; --down:#f4685f;
    --geopolitics:#f4685f; --economy:#3fb950; --technology:#a970ff; --science:#2dd4bf;
    --health:#f472b6; --climate:#5cc98a; --india:#ff9933; --markets:#5b9dff; --learn:#f5b942;
    /* clean & friendly: native rounded headings, neutral sans body (no downloads) */
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --round:ui-rounded,"SF Pro Rounded",-apple-system,"Segoe UI",Roboto,sans-serif;
    /* clears the fixed progress bar (6px) + header (15px) + notch, with breathing room */
    --deck-top:calc(env(safe-area-inset-top) + 44px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);
    font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  a{color:var(--accent);text-decoration:none}

  /* ---- the deck: a smooth, fully scrollable reading feed (no snap traps) ---- */
  #deck{position:fixed;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;
    overscroll-behavior-y:contain;scrollbar-width:none}
  #deck::-webkit-scrollbar{display:none}
  .feed{max-width:640px;margin:0 auto;
    padding:var(--deck-top) 14px calc(76px + env(safe-area-inset-bottom))}

  /* reading-progress bar fills with scroll position; slim top bar sits above it */
  #progress{position:fixed;top:0;left:0;height:3px;width:0;z-index:31;background:var(--accent);
    border-radius:0 2px 2px 0;transition:width .08s linear}
  #hdr{position:fixed;top:0;left:0;right:0;z-index:30;height:var(--deck-top);
    display:flex;justify-content:space-between;align-items:center;gap:10px;
    padding:calc(env(safe-area-inset-top) + 7px) 14px 7px;font-size:11.5px;color:var(--dim);
    background:linear-gradient(180deg, var(--bg) 62%, transparent)}
  #hdr .stale{color:var(--amber)}
  #hdr a{color:var(--dim);border:1px solid var(--line);border-radius:99px;padding:4px 11px;background:var(--panel2)}

  /* ---- a card is an elevated panel; full content, nothing clipped ---- */
  .card{position:relative;background:linear-gradient(180deg, var(--panel), var(--panel2));
    border:1px solid var(--line);border-left:4px solid var(--cat,var(--accent));
    border-radius:16px;padding:17px 17px 19px;margin-bottom:15px;
    display:flex;flex-direction:column;gap:13px;box-shadow:0 6px 22px rgba(0,0,0,.22)}

  /* cover = hero */
  .cover{text-align:center;display:flex;flex-direction:column;gap:15px;padding:6px 6px 24px;margin-bottom:6px}
  .cover .chips,.cover .meta,.cover .counts{justify-content:center}
  .scrollcue{font-size:12.5px;font-weight:600;color:var(--dim);animation:bob 1.7s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0);opacity:.5}50%{transform:translateY(4px);opacity:1}}

  /* divider = section chapter header */
  .divider{text-align:center;margin:26px 2px 14px}
  .divider .t{font-family:var(--round);font-weight:800;font-size:18px;letter-spacing:.01em}
  .divider .sub{font-size:13px;color:var(--dim);margin-top:4px;line-height:1.45}
  .divider .rule{height:1px;background:var(--line);margin-top:13px}

  /* ---- shared content ---- */
  .meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12.5px;font-weight:600;color:var(--dim)}
  .catchip{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:99px;
    font-size:12.5px;font-weight:700;background:color-mix(in srgb, var(--cat, var(--accent)) 18%, transparent);
    color:var(--cat, var(--accent))}
  .ribbon{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:99px;font-size:11.5px;
    font-weight:700;background:rgba(245,185,66,.14);color:var(--amber)}
  .stance{display:inline-flex;padding:4px 11px;border-radius:99px;font-size:11.5px;font-weight:700;
    background:color-mix(in srgb,var(--accent) 16%,transparent);color:var(--accent)}
  h1{margin:0;font-family:var(--round);font-size:22px;line-height:1.27;font-weight:700;letter-spacing:-.2px}
  h1.big{font-size:28px;line-height:1.2;font-weight:800;letter-spacing:-.4px}
  .body{font-size:16px;line-height:1.62;color:#d3dbe6}
  mark{background:color-mix(in srgb,var(--amber) 20%,transparent);color:var(--txt);border-radius:4px;padding:0 3px;font-weight:600}
  /* THE moot — the one takeaway, unmistakably the hero */
  .moot{background:linear-gradient(135deg, color-mix(in srgb, var(--cat,var(--accent)) 14%, var(--panel)), var(--panel2));
    border:1px solid color-mix(in srgb, var(--cat,var(--accent)) 32%, var(--line));
    border-left:5px solid var(--cat, var(--accent));border-radius:14px;padding:14px 16px}
  .moot .lbl{font-size:10.5px;font-weight:800;letter-spacing:.12em;color:var(--cat,var(--accent));text-transform:uppercase;margin-bottom:7px}
  .moot .txt{font-family:var(--round);font-size:18px;font-weight:700;line-height:1.5}
  .chips{display:flex;gap:8px;flex-wrap:wrap}
  .cchip{font-size:12.5px;font-weight:600;padding:8px 13px;min-height:38px;display:inline-flex;align-items:center;
    border-radius:99px;border:1px solid var(--line);background:var(--panel2);color:var(--dim);cursor:pointer}
  .cchip:active{background:var(--panel)}
  .decode{align-self:flex-start;font-size:13.5px;font-weight:700;color:var(--cat,var(--accent));cursor:pointer;min-height:42px;
    display:inline-flex;align-items:center;gap:2px;border:1px solid color-mix(in srgb,var(--cat,var(--accent)) 36%,var(--line));
    background:color-mix(in srgb,var(--cat,var(--accent)) 8%,transparent);border-radius:99px;padding:0 18px}
  .decode:active{background:color-mix(in srgb,var(--cat,var(--accent)) 16%,transparent)}
  .daylbl{font-size:13px;font-weight:700;color:var(--dim);letter-spacing:.08em;text-transform:uppercase}
  .counts{display:flex;gap:22px;justify-content:center;font-size:12.5px;color:var(--dim)}
  .counts b{color:var(--txt);font-size:19px;font-family:var(--round);display:block}
  .bigemoji{font-size:40px;line-height:1}

  /* board */
  .brow{display:flex;align-items:center;gap:10px;padding:11px 2px;min-height:44px;
    border-bottom:1px solid var(--line);cursor:pointer}
  .brow:last-child{border-bottom:none}
  .brow .nm{flex:1 1 auto;min-width:0}
  .brow .nm b{font-size:14.5px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brow .nm span{display:block;font-size:10.5px;color:var(--dim)}
  .brow .val{flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-end;gap:3px}
  .brow .val .num{font-family:var(--round);font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}
  .pct{display:inline-block;font-size:12px;font-weight:800;padding:1px 8px;border-radius:99px;font-variant-numeric:tabular-nums}
  .pct.up{color:var(--up);background:color-mix(in srgb,var(--up) 16%,transparent)}
  .pct.down{color:var(--down);background:color-mix(in srgb,var(--down) 16%,transparent)}
  .up{color:var(--up)} .down{color:var(--down)}
  .spark{flex:0 0 48px}

  /* favorite */
  .price{font-family:var(--round);font-size:30px;font-weight:800;letter-spacing:-.5px;font-variant-numeric:tabular-nums}
  .price .pct{font-size:15px;margin-left:10px;vertical-align:middle}

  /* quiz */
  .veil{position:relative;cursor:pointer}
  .veil .txt{filter:blur(9px);transition:filter .3s;user-select:none}
  .veil.open .txt{filter:none}
  .veil .tap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:13.5px;font-weight:700;color:var(--txt)}
  .veil.open .tap{display:none}

  /* outro */
  .note{border:1px solid var(--line);border-radius:12px;background:var(--panel2);padding:11px 14px;font-size:14px;text-align:left}
  .note .w{color:var(--dim);font-size:12.5px}
  .disc{font-size:11.5px;line-height:1.5;color:var(--dim)}

  /* ---- bottom sheet (decode + glossary) ---- */
  #mask{position:fixed;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:opacity .25s;z-index:40}
  #mask.open{opacity:1;pointer-events:auto}
  #sheet{position:fixed;left:0;right:0;bottom:0;z-index:41;background:var(--panel);
    border:1px solid var(--line);border-bottom:none;border-radius:20px 20px 0 0;
    max-height:82vh;max-height:82dvh;transform:translateY(105%);transition:transform .3s cubic-bezier(.3,.9,.3,1);
    display:flex;flex-direction:column}
  #sheet.open{transform:translateY(0)}
  #sheet .bar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 8px}
  #sheet .bar h3{margin:0;font-size:16px}
  #sheet .x{font-size:22px;color:var(--dim);cursor:pointer;padding:2px 8px;line-height:1}
  #sbody{overflow-y:auto;padding:4px 18px calc(22px + env(safe-area-inset-bottom));overscroll-behavior:contain}
  .sec{margin:12px 0}
  .sec .k{font-size:10.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--cat,var(--accent));margin-bottom:4px}
  .sec .v{font-size:14.5px;color:#c9d4e2}
  .kt{border-left:3px solid var(--line);padding:4px 10px;margin:7px 0;font-size:13.5px}
  .kt b{color:var(--txt)}
  .src{font-size:13px;margin:4px 0}
  .one{color:var(--dim);font-size:14px;margin-bottom:8px}
  .scale{font-family:ui-monospace,Menlo,monospace;font-size:12px;color:var(--dim);background:var(--panel2);
    border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-top:10px;overflow-x:auto;white-space:nowrap}

  #empty{position:fixed;inset:0;display:none;align-items:center;justify-content:center;text-align:center;padding:30px;color:var(--dim)}
</style>
</head>
<body>

<div id="progress"></div>
<div id="hdr"><span id="stamp"></span><a href="../">Dashboard →</a></div>
<div id="deck"></div>
<div id="empty"><div><div style="font-size:40px">📭</div>No deck yet for today.<br>Run the daily pipeline, then reload.</div></div>

<div id="mask" onclick="closeSheet()"></div>
<div id="sheet">
  <div class="bar"><h3 id="stitle"></h3><span class="x" onclick="closeSheet()">✕</span></div>
  <div id="sbody"></div>
</div>

<script>
const esc = s => (s==null?'':String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])));
const CAT = {
  geopolitics:{lbl:"Geopolitics",emoji:"🌍"}, economy:{lbl:"Economy",emoji:"💵"},
  technology:{lbl:"Technology",emoji:"⚙️"}, science:{lbl:"Science",emoji:"🔬"},
  health:{lbl:"Health",emoji:"🩺"}, climate:{lbl:"Climate",emoji:"🌱"}, india:{lbl:"India",emoji:"🇮🇳"},
  markets:{lbl:"Markets",emoji:"📈"}, learn:{lbl:"Learn",emoji:"🎓"}
};
const THREAD = {developing:"📈 Developing", escalating:"🔺 Escalating", cooling:"🔻 Cooling", resolved:"✅ Resolved"};
const sgn = p => p==null?'—':(p>=0?'+':'')+Number(p).toFixed(2)+'%';
const cls = p => p>=0?'up':'down';
const IS_LOCAL = /^(localhost|127\.|192\.168\.|10\.|172\.(1[6-9]|2\d|3[01])\.)/.test(location.hostname);

function relTime(iso){
  if(!iso) return '';
  const t = new Date(iso); if(isNaN(t)) return '';
  const m = Math.max(0, Math.round((Date.now()-t)/60000));
  if(m<2) return 'just now'; if(m<60) return m+'m ago';
  const h = Math.round(m/60); if(h<24) return h+'h ago';
  const d = Math.round(h/24); return d===1?'yesterday':d+'d ago';
}
const todayLocal = () => new Date().toLocaleDateString('en-CA');
// highlight standalone money/percent figures — runs AFTER esc(), so it's injection-safe
const hl = s => esc(s).replace(/([₹$€£]\s?\d[\d,]*\.?\d*|\b\d+(?:\.\d+)?%)/g, '<mark>$1</mark>');

let DECK = null;

/* ---------- renderers: each card type ---------- */
function catStyle(cat){ return `--cat:var(--${CAT[cat]?cat:'markets'})`; }
function catChip(cat){
  const c = CAT[cat]||CAT.markets;
  return `<span class="catchip">${c.emoji} ${c.lbl}</span>`;
}
function threadRibbon(t){
  if(!t||!t.status) return '';
  const day = t.day?` — day ${esc(t.day)}`:'';
  return `<span class="ribbon">${THREAD[t.status]||'📈 '+esc(t.status)}${day}</span>`;
}
function chips(keys){
  const ok = (keys||[]).filter(k=>typeof GLOSSARY!=='undefined'&&GLOSSARY[k]);
  return ok.length?`<div class="chips">${ok.map(k=>{
    const t = GLOSSARY[k].term.split(' — ')[0].split(' (')[0];
    return `<span class="cchip" onclick="openGloss('${k}')">📚 ${esc(t)}</span>`;}).join('')}</div>`:'';
}
function mootBlock(txt, lbl){
  return txt?`<div class="moot"><div class="lbl">💡 ${lbl||'The takeaway'}</div><div class="txt">${esc(txt)}</div></div>`:'';
}
function sparkSVG(pts){
  if(!pts||pts.length<3) return '';
  const min=Math.min(...pts), max=Math.max(...pts), r=(max-min)||1;
  const xy = pts.map((v,i)=>`${(i/(pts.length-1)*58+2).toFixed(1)},${(16-(v-min)/r*12+1).toFixed(1)}`).join(' ');
  const up = pts[pts.length-1]>=pts[0];
  return `<svg class="spark" width="62" height="18" viewBox="0 0 62 18">
    <polyline points="${xy}" fill="none" stroke="${up?'var(--up)':'var(--down)'}" stroke-width="1.6"/></svg>`;
}

// Renderers return the INNER content of a card; render() wraps each in its <section> with category theming.
const R = {
  cover: c => `
    <div class="daylbl">${esc(DECK.day_label||DECK.date)}</div>
    <h1 class="big">${esc(c.headline)}</h1>
    ${c.big_picture?`<div class="body" style="text-align:left">${esc(c.big_picture)}</div>`:''}
    ${c.market_headline?`<div class="meta">📈 ${esc(c.market_headline)}</div>`:''}
    <div class="counts"><span><b>${c.counts.stories}</b>world</span><span><b>${c.counts.markets}</b>markets</span><span><b>${c.counts.learn}</b>learn</span></div>
    <div class="scrollcue">scroll to read ↓</div>`,

  story: c => `
    <div class="meta">${catChip(c.category)}${threadRibbon(c.thread)}${c.importance==='critical'?'<span style="color:var(--down)">● critical</span>':''}</div>
    <h1>${esc(c.title)}</h1>
    <div class="body">${hl(c.what_happened)}</div>
    ${mootBlock(c.moot)}
    ${chips(c.concepts)}
    <span class="decode" onclick='openDecode(${JSON.stringify(c.id)})'>Full decode: background, ripples & sources →</span>`,

  divider: c => `<div class="t">${esc(c.emoji)} ${esc(c.title)}</div>
    ${c.subtitle?`<div class="sub">${esc(c.subtitle)}</div>`:''}<div class="rule"></div>`,

  market_story: c => `
    <div class="meta">${catChip('markets')} <span>the market story</span></div>
    <div class="body">${hl(c.story)}</div>
    ${mootBlock(c.moot)}
    <span class="decode" onclick='openDecode(${JSON.stringify(c.id)})'>US · India · crypto · catalysts →</span>`,

  board: c => `
    <div class="meta">${catChip('markets')} <span>today's board — tap a row to learn it</span></div>
    <div>${c.items.map((b,i)=>`<div class="brow" onclick='openBoardRead(${i})'>
      <div class="nm"><b>${esc(b.name)}</b><span>${esc(b.ticker)}</span></div>
      ${sparkSVG(b.spark)}
      <div class="val"><span class="num">${esc(b.currency||'')}${esc(b.value)}</span><span class="pct ${cls(b.change_pct)}">${sgn(b.change_pct)}</span></div>
    </div>`).join('')}</div>
    ${mootBlock(c.moot)}`,

  watch: c => `
    <div class="meta">${catChip('markets')}<span>watch #${esc(c.rank)}</span>${(c.tickers||[]).slice(0,3).map(t=>`<span class="stance">${esc(t)}</span>`).join('')}</div>
    <h1>${esc(c.title)}</h1>
    <div class="body">${hl(c.gist)}</div>
    ${c.what_it_means?`<div class="body" style="color:var(--txt)"><b>What it means for you:</b> ${hl(c.what_it_means)}</div>`:''}
    ${mootBlock(c.moot)}
    ${chips(c.concepts)}
    <span class="decode" onclick='openDecode(${JSON.stringify(c.id)})'>Why it matters & what to watch →</span>`,

  favorite: c => `
    <div class="meta">${catChip('markets')}<span>your stock</span>${c.moot?`<span class="stance">${esc(c.moot)}</span>`:''}</div>
    <h1>${esc(c.name||c.ticker)} <span style="color:var(--dim);font-size:16px">${esc(c.ticker)}</span></h1>
    <div class="price">${esc(c.currency||'')}${c.price!=null?Number(c.price).toLocaleString():'—'}<span class="pct ${cls(c.change_pct)}">${sgn(c.change_pct)}</span></div>
    ${c.whats_new?`<div class="body">${hl(c.whats_new)}</div>`:''}
    <span class="decode" onclick='openDecode(${JSON.stringify(c.id)})'>Fundamentals, technicals & risks →</span>`,

  concept: c => {
    const g = (typeof GLOSSARY!=='undefined')&&GLOSSARY[c.key];
    if(!g) return `<h1>🎓</h1>`;
    return `
      <div class="meta">${catChip('learn')}<span>concept of the day</span>${c.why_today?`<span style="color:var(--amber)">★ live today</span>`:''}</div>
      <h1>${esc(g.term)}</h1>
      <div class="body">${esc(g.one)}</div>
      ${mootBlock(g.why,'Why it matters to you')}
      <span class="decode" onclick='openGloss(${JSON.stringify(c.key)})'>Learn how to read it →</span>`;
  },

  quiz: c => `
    <div class="meta">${catChip('learn')}<span>flashback · ${esc(c.context_date)}</span></div>
    <h1 style="font-size:20px">${esc(c.context_title)}</h1>
    <div class="body">${esc(c.question)}</div>
    <div class="moot veil" onclick="this.classList.add('open')">
      <div class="lbl">💡 The lesson (tap to reveal)</div>
      <div class="txt">${esc(c.answer)}</div>
      <div class="tap">👆 tap to reveal</div></div>
    ${chips(c.concepts)}`,

  outro: c => `
    <div class="meta">${catChip('markets')}<span>quick hits — also notable today</span></div>
    ${(c.also_notable||[]).slice(0,5).map(n=>`<div class="note"><b>${esc(n.title)}</b><div class="w">${esc(n.why)}</div></div>`).join('')||'<div class="body">Nothing else cleared the bar today.</div>'}
    <a class="decode" href="${esc(c.dashboard_url||'../')}">Open the full dashboard →</a>
    <div class="disc">${esc(c.disclaimer)}${IS_LOCAL?' · Live refresh & any-ticker analysis available on the local dashboard.':''}</div>`
};

/* ---------- feed assembly + reading progress ---------- */
const SECTION = {cover:'cover', divider:'divider'};   // these render outside the panel style
const cardCat = c => c.category || ({concept:'learn', quiz:'learn'})[c.type] || 'markets';
function render(){
  const deck = document.getElementById('deck');
  deck.innerHTML = `<div class="feed">` + DECK.cards.map((c,i)=>
    `<section class="${SECTION[c.type]||'card'}" data-i="${i}" style="${catStyle(cardCat(c))}">${(R[c.type]||(()=>''))(c)}</section>`
  ).join('') + `</div>`;

  // reading-progress bar tracks scroll position
  const bar = document.getElementById('progress');
  const onScroll = () => {
    const max = deck.scrollHeight - deck.clientHeight;
    bar.style.width = (max > 0 ? Math.min(100, deck.scrollTop / max * 100) : 0) + '%';
  };
  deck.addEventListener('scroll', onScroll, {passive:true});
  onScroll();

  const stale = DECK.date < todayLocal();
  document.getElementById('stamp').innerHTML =
    `<span class="${stale?'stale':''}">${esc(DECK.day_label||DECK.date)}${stale?' · ⏳ yesterday\'s deck':''} · ${relTime(DECK.generated_at)}</span>`;
}

/* ---------- bottom sheet ---------- */
function openSheet(title, html, cat){
  const sheet = document.getElementById('sheet');
  sheet.style.setProperty('--cat', `var(--${CAT[cat]?cat:'markets'})`);
  document.getElementById('stitle').textContent = title;
  document.getElementById('sbody').innerHTML = html;
  document.getElementById('sbody').scrollTop = 0;
  document.getElementById('mask').classList.add('open');
  sheet.classList.add('open');
}
function closeSheet(){
  document.getElementById('mask').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
}
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeSheet(); });

const DEPTH_LBL = {
  background:"Background", why_it_matters:"Why it matters", ripple_effects:"Ripple effects",
  why_now:"Why now", watch_next:"Watch next", market_link:"Market link", watch:"Watch next",
  news:"Recent news", fundamentals:"Fundamentals", technicals:"Technicals",
  catalysts:"Catalysts", risks:"Risks", catalysts_today:"Today's catalysts"
};
function sec(k,v){ return v?`<div class="sec"><div class="k">${DEPTH_LBL[k]||k}</div><div class="v">${esc(v)}</div></div>`:''; }

function openDecode(id){
  const c = DECK.cards.find(x=>x.id===id); if(!c||!c.depth) return;
  const d = c.depth; let h = '';
  if(c.thread) h += sec('previously', c.thread.previously) + (c.thread.changed?`<div class="sec"><div class="k">What changed today</div><div class="v">${esc(c.thread.changed)}</div></div>`:'');
  if(c.type==='story') h += ['background','why_it_matters','ripple_effects','why_now','watch_next','market_link'].map(k=>sec(k,d[k])).join('');
  if(c.type==='watch') h += ['why_it_matters','watch'].map(k=>sec(k,d[k])).join('');
  if(c.type==='favorite'){
    if(Array.isArray(d.news)&&d.news.length) h += `<div class="sec"><div class="k">Recent news</div>${d.news.map(n=>`<div class="src">• ${n.url?`<a href="${esc(n.url)}" target="_blank">${esc(n.headline)}</a>`:esc(n.headline)}${n.source?` — ${esc(n.source)}`:''}</div>`).join('')}</div>`;
    h += ['fundamentals','technicals','catalysts','risks'].map(k=>sec(k,typeof d[k]==='string'?d[k]:null)).join('');
  }
  if(c.type==='market_story'){
    const g = d.global_summary||{};
    h += sec('US', g.us)+sec('India', g.india)+sec('Crypto', g.crypto)+sec('Macro', g.macro);
    if((d.catalysts_today||[]).length) h += `<div class="sec"><div class="k">Today's catalysts</div>${d.catalysts_today.map(x=>`<div class="src">• ${esc(x)}</div>`).join('')}</div>`;
    if((d.risks||[]).length) h += `<div class="sec"><div class="k">Risks</div>${d.risks.map(x=>`<div class="src">• ${esc(typeof x==='string'?x:JSON.stringify(x))}</div>`).join('')}</div>`;
  }
  if((d.key_terms||[]).length) h += `<div class="sec"><div class="k">Key terms</div>${d.key_terms.map(t=>`<div class="kt"><b>${esc(t.term)}</b> — ${esc(t.definition)}</div>`).join('')}</div>`;
  if((d.sources||[]).length) h += `<div class="sec"><div class="k">Sources</div>${d.sources.map(s=>`<div class="src">🔗 <a href="${esc(s.url)}" target="_blank">${esc(s.name)}</a></div>`).join('')}</div>`;
  openSheet(c.title||c.name||'Decoded', h, c.category);
}

function openCover(){
  const c = DECK.cards.find(x=>x.type==='cover'); if(!c) return;
  let h = `<div class="sec"><div class="k">The big picture</div><div class="v">${esc(c.big_picture)}</div></div>`;
  if(c.market_headline) h += `<div class="sec"><div class="k">Markets today</div><div class="v">${esc(c.market_headline)}</div></div>`;
  openSheet(c.headline, h, 'markets');
}

function openBoardRead(i){
  const c = DECK.cards.find(x=>x.type==='board'); if(!c) return;
  const b = c.items[i]; if(!b) return;
  openSheet(`${b.name} — ${b.currency||''}${b.value} (${sgn(b.change_pct)})`,
    `<div class="sec"><div class="k">What this number is telling you</div><div class="v">${esc(b.read)}</div></div>`
    + (b.spark?`<div class="sec"><div class="k">Last ${b.spark.length} briefs</div><div class="v">${b.spark.map(v=>v.toLocaleString()).join(' → ')}</div></div>`:''),
    'markets');
}

function openGloss(key){
  const g = (typeof GLOSSARY!=='undefined')&&GLOSSARY[key]; if(!g) return;
  openSheet(g.term,
    `<div class="one">${esc(g.one)}</div>`
    + `<div class="sec"><div class="k">What it measures</div><div class="v">${esc(g.what)}</div></div>`
    + `<div class="sec"><div class="k">How to read it</div><div class="v">${esc(g.read)}</div></div>`
    + `<div class="sec"><div class="k">Why it matters to you</div><div class="v">${esc(g.why)}</div></div>`
    + (g.scale?`<div class="scale">${esc(g.scale)}</div>`:''), 'learn');
}

/* ---------- boot ---------- */
fetch('../reels.json')
  .then(r=>{ if(!r.ok) throw 0; return r.json(); })
  .then(d=>{ DECK=d; render(); })
  .catch(()=>{ document.getElementById('empty').style.display='flex'; });

if('serviceWorker' in navigator && (location.protocol==='https:'||location.hostname==='localhost')){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
